$kind: http-request
name: 'Login (Wrong Credentials - Negative Test)'
method: POST
url: '{{baseUrl}}/api/auth/login'
order: 1500
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "wrong@email.com",
      "password": "wrongpassword"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      // Demo guide steps 6-7 (2.1.4): Generic authentication failure messages
      // Both wrong email and wrong password must return the same generic error
      // to prevent user enumeration attacks.

      pm.test('Status is 401 Unauthorized', function () {
        pm.response.to.have.status(401);
      });

      pm.test('Error message is generic - does not reveal which credential failed', function () {
        const json = pm.response.json();
        pm.expect(json).to.have.property('error');
        pm.expect(json.error).to.eql('Invalid username and/or password');
      });

      pm.test('Response does not reveal whether email exists', function () {
        const body = pm.response.text().toLowerCase();
        pm.expect(body).to.not.include('email not found');
        pm.expect(body).to.not.include('user not found');
        pm.expect(body).to.not.include('no account');
      });
