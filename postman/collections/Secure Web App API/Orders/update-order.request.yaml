$kind: http-request
method: PATCH
url: '{{baseUrl}}/api/orders/:id'
order: 3000
pathVariables:
  - key: id
    value: 'order-id'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "productName": "Wireless Keyboard",
      "quantity": 3,
      "notes": "Update delivery instructions."
    }
